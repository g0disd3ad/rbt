services:
  db:
    image: postgres:15-alpine
    container_name: rbt-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  app:
    build: .
    container_name: rbt-api
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env
    stdin_open: true 
    tty: true
volumes:
  pgdata: